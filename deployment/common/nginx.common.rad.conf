events {}
http {
  client_max_body_size 200M;
  
  include /etc/nginx/mime.types;
  
  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
      listen       443 ssl;
      server_name  localhost;

      ssl_certificate /etc/nginx/ssl/certfile.pem;
      ssl_certificate_key /etc/nginx/ssl/keyfile.pem;

      root   /usr/share/nginx/html;
      index  index.html;

      location /cofinityXcentralidp/auth/ {
		  proxy_pass https://centralidp.svc.cofinity-x.com/auth/;  # 
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # 用于处理 CORS 的相关头（如果需要）
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 如果需要处理预检请求
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }
	  
	  location /cofinityXbackend/api/ {
		  proxy_pass https://portal-backend.svc.cofinity-x.com/api/;  # 
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # 用于处理 CORS 的相关头（如果需要）
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 如果需要处理预检请求
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

	   # 2.EDC
      location /beta/edc/management/ {
          proxy_pass {{EDC_HOST}}/management-beta1/;  # EDC
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      location /beta/edc/proxy/ {
		  proxy_pass {{EDC_HOST}}/proxy-beta1/;  # EDC
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }


      # 5.NRI backend
      location /beta/backendServer/ {
		  proxy_pass {{BACK_END_HOST}}/backend-beta/;  # backendServer
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, PUT, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Requested-With';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, PUT, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Requested-With';
              add_header Content-Length 0;
              return 204;
          }
      }

      # 7.DTR
      location /beta/dtr/ {
		  proxy_pass {{DTR_HOST}}/;  # DTR
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      # 8.assxServer
      location /beta/assxServer/ {
		  proxy_pass {{AASX_HOST}}/;  # assxServer
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      location / {
          try_files $uri $uri/ /index.html;
      }
  }
}
