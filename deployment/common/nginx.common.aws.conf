events {}
http {
  client_max_body_size 200M;
  
  include /etc/nginx/mime.types;

  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
      listen       80;
      server_name  localhost;

      root   /usr/share/nginx/html;
      index  index.html;

      # 1.cofinityX(beta)
      location /beta/cofinityXcentralidp/auth/ {
		  proxy_pass https://centralidp.beta.cofinity-x.com/auth/;  # cofinity beta
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }
	  
	  location /beta/cofinityXbackend/api/ {
		  proxy_pass https://portal-backend.beta.cofinity-x.com/api/;  # cofinity beta
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      # 2.EDC
      location /beta/edc/management/ {
          proxy_pass {{EDC_HOST}}/management/;  # EDC
          #proxy_set_header Host $host;
          proxy_set_header Host {{AWS_HOST}};
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      location /beta/edc/proxy/ {
		  proxy_pass {{EDC_HOST}}/proxy/;  # EDC
          proxy_set_header Host {{AWS_HOST}};
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }


      # 5.NRI backend
      location /beta/backendServer/ {
		  proxy_pass {{BACK_END_HOST}}/backend/;  # backendServer
          proxy_set_header Host {{AWS_HOST}};
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, PUT, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Requested-With';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, PUT, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Requested-With';
              add_header Content-Length 0;
              return 204;
          }
      }
      
      # 7.DTR
      location /beta/dtr/ {
		  proxy_pass http://129.213.90.219:4243/;  # DTR
          proxy_set_header Host {{AWS_HOST}};
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      # 8.assxServer
      location /beta/assxServer/ {
		  proxy_pass http://132.145.140.230:51001/;  # assxServer
          proxy_set_header Host {{AWS_HOST}};
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # CORS
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }      

      location / {
          try_files $uri $uri/ /index.html;
      }
  }
}
