events {}
http {
  client_max_body_size 200M;
  
  include /etc/nginx/mime.types;
  
  access_log /dev/stdout;
  error_log /dev/stderr;

  upstream consumerapi {
    server 132.145.140.230;
  }

  upstream providerapi {
    server 132.145.140.230;
  }

  server {
      listen       80;
      server_name  localhost;

      root   /usr/share/nginx/html;
      index  index.html;

      location /management {
          proxy_pass http://consumerapi; # consumerapi后端 API 地址
          #proxy_pass https://orozhsl5r6kggh7srwfxpfqjda.apigateway.us-ashburn-1.oci.customer-oci.com/v2/bob/management/;  # API Gateway V2
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;

          # 用于处理 CORS 的相关头（如果需要）
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
          add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
          
          # 如果需要处理预检请求
          if ($request_method = OPTIONS) {
              add_header Access-Control-Allow-Origin *;
              add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
              add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept';
              add_header Content-Length 0;
              return 204;
          }
      }

      location /proxy/ {
