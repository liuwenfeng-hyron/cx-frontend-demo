<div id="wrapper">
    <div *ngIf="filteredSubmodels$ | async as filteredSubmodels" >
      <!-- Search Bar -->
      <mat-form-field class="search-form-field" color="accent">
        <mat-label>Search by IdShort</mat-label>
        <input (input)="onSearch()" [(ngModel)]="searchText" matInput>
        <mat-icon matPrefix>search</mat-icon>
        <button (click)="searchText=''; onSearch()" *ngIf="searchText" mat-icon-button matSuffix>
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
      <!-- paginator -->
      <mat-paginator [length]="(filteredSubmodels)?.length" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20, 50]" showFirstLastButtons (page)="onPageChange($event)"> </mat-paginator>
      <button (click)="onCreate()" color="primary" mat-raised-button  class="action-button">
        Create
      </button>
      <table mat-table [dataSource]="filteredSubmodels | slice: offset : (offset + pageSize)" class="mat-elevation-z8">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef scope="col">Id</th>
            <td mat-cell *matCellDef="let item">
                <a
                  class="link"
                  href="javascript:void(0)"
                  (click)="onShowDetail(item.id)">
                  {{item.id}}
                </a>
                <!--
                <button [cdkCopyToClipboard]="item.id" color="warn" mat-raised-button  class="action-button">
                  Copy
                </button>
                -->
            </td>
        </ng-container>

        <ng-container matColumnDef="idShort">
            <th mat-header-cell *matHeaderCellDef scope="col">IdShort</th>
            <td mat-cell *matCellDef="let item">{{item.idShort}}</td>
        </ng-container>

        <ng-container matColumnDef="kind">
            <th mat-header-cell *matHeaderCellDef scope="col">Kind</th>
            <td mat-cell *matCellDef="let item">{{item.kind}}</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef scope="col">Actions</th>
          <td mat-cell *matCellDef="let item" class="singleline-cell">
            <button (click)="onUpdate(item.id)" color="primary" mat-raised-button  class="action-button">
              Edit
            </button>
            <button (click)="onDelete(item.id)" color="warn" mat-raised-button  class="action-button">
              Delete
            </button>            
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns" class="submodels-table-header"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
    </div>    
</div>
